<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
    <link rel="shortcut icon" href="img/faviconn.ico" type="image/x-icon">
    <title>Portfolio GSAP</title>
</head>
<body>
    <div class="wrapper">
        <!-- padrao EUA do uso BEM-->
        <header class="header gsap__anim">
            <div class="parallax__wrapp">
                <div class="header__bg">
                    <img src="img/1.png" alt="">
                    <img src="img/1.png" alt="">
                </div>
                <!--content quer dizer= conteudo principal, padrão BEM americano-->
                <div class="content">
                        <h1 class="title title-p">Portfolio<span class="stroke">GSAP</span></h1>
                </div>
            </div>
        </header>

        <main class="main">
            <!--padrao EUA arquitetura moderna-->
            <!--SEÇÃO DE SERVIÇOS-->
            <section class="section gsap__anim serv">
                <div class="parallax__wrapp">
                    <div class="content">
                        <div class="serv__wrapp">
                            <h2 class="title">
                                <span class="title__wrapp">
                                    <span class="title__img">
                                        <img src="img/fm.svg" alt="">
                                    </span>
                                    <div class="title__txt">
                                        <span class="title_t">os</span>
                                        <span class="stroke">serviços</span>
                                    </div>

                                </span>
                            </h2>
                            <ul class="serv__list">
                                <li class="serv__item">Direção criativa
                                    <span class="serv__item-img">
                                        <img src="img/2.jpg" alt="">
                                    </span>
                                </li>
                                <li class="serv__item">Identidade e Branding
                                    <span class="serv__item-img">
                                        <img src="img/3.jpg" alt="">
                                    </span>
                                </li>
                                <li class="serv__item">Conteúdo Visual
                                    <span class="serv__item-img">
                                        <img src="img/4.png" alt="">
                                    </span>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </section>

            <!--SEÇÃO DE PORTFOLIO-->

            <section class="section gsap__anim portfolio">
                <div class="parallax__wrapp">
                    <div class="content">
                        <div class="portfolio__wrapp">
                            <ul class="portfolio__list">
                                <li class="portfolio__item">
                                    <div class="portfolio__item-img">
                                        <img src="img/5.jpg" alt="">
                                    </div>
                                </li>
                                <li class="portfolio__item">
                                    <div class="portfolio__item-img">
                                        <img src="img/6.jpg" alt="">
                                    </div>
                                </li>
                                <li class="portfolio__item">
                                    <div class="portfolio__item-img">
                                        <img src="img/7.jpg" alt="">
                                    </div>
                                </li>
                                <li class="portfolio__item">
                                    <div class="portfolio__item-img">
                                        <img src="img/8.jpg" alt="">
                                    </div>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </section>

            <!--RODAPE-->
            <section class="section gsap__anim approve">
                <div class="parallax__wrapp">
                    <div class="content">
                        <div class="approve__wrapp">
                            <span class="approve__txt">
                                <span class="approve__star">
                                    <img src="img/fm.svg" alt="">
                                </span>
                                <span class="approve__ix">industriasfilypy</span>
                            </span>
                        </div>
                    </div>
                </div>
            </section>

            <!--Header Final-->
            <section class="header gsap__anim">
            <div class="parallax__wrapp">
                <div class="header__bg">
                    <img src="img/1.png" alt="">
                    <img src="img/1.png" alt="">
                </div>
                <!--content quer dizer= conteudo principal, padrão BEM americano-->
                <div class="content">
                        <h2 class="title">Obrigado<span class="stroke">IndustryFM</span></h2>
                </div>
            </div>
        </section>
        </main>
    </div>    

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://unpkg.com/lenis@1.3.23/dist/lenis.min.js"></script> 
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
    <script src="js/js.js"></script>
</body>
</html>
